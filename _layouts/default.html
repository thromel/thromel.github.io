<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    {% if page.title == site.data.profile.navbar_name %}
    <title>{{ page.title }}</title>
    {% else %}
    <title>{{ page.title }} - {{ site.data.profile.navbar_name }}</title>
    {% endif %}

    <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/images/favicon/favicon-16x16.png">
    <link rel="shortcut icon" href="/assets/images/favicon/favicon.ico">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/academicons/1.9.1/css/academicons.min.css" integrity="sha512-b1ASx0WHgVFL5ZQhTgiPWX+68KjS38Jk87jg7pe+qC7q9YkEtFq0z7xCglv7qGIs/68d3mAp+StfC8WKC5SSAg==" crossorigin="anonymous">

    <link rel="stylesheet" href="{{ '/assets/css/overhaul.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/mobile-optimizations.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/components/oss-summary.css' | relative_url }}">

    <script>
      (function () {
        var theme = 'light';
        try {
          var stored = localStorage.getItem('theme');
          if (stored === 'dark' || stored === 'light') {
            theme = stored;
          } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
            theme = 'dark';
          }
        } catch (_) {}
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-P0TDZ6WNVT"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-P0TDZ6WNVT');
    </script>
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <a href="#site-navigation" class="skip-link">Skip to navigation</a>

    {% include navbar.html %}

    <main id="main-content" class="academic-page" role="main">
        {{ content }}
    </main>

    {% include footer.html %}

    <script src="{{ '/assets/js/site-shell.js' | relative_url }}" defer></script>
    <script src="{{ '/assets/js/oss-summary.js' | relative_url }}" defer></script>
</body>
</html>
