<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    {% if page.title == site.data.profile.navbar_name %}
    <title>{{ page.title }}</title>
    {% else %}
    <title>{{ page.title }} - {{ site.data.profile.navbar_name }}</title>
    {% endif %}

    <!-- Favicons -->
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/images/favicon/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/images/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/images/favicon/favicon-16x16.png">
    <link rel="shortcut icon" href="/assets/images/favicon/favicon.ico">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Source+Serif+4:opsz,wght@8..60,400;8..60,600;8..60,700&display=swap" rel="stylesheet">

    <!-- Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/academicons/1.9.1/css/academicons.min.css" integrity="sha512-b1ASx0WHgVFL5ZQhTgiPWX+68KjS38Jk87jg7pe+qC7q9YkEtFq0z7xCglv7qGIs/68d3mAp+StfC8WKC5SSAg==" crossorigin="anonymous">
    <!-- DevIcons for Tech Logos -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/devicons/devicon@latest/devicon.min.css">

    <!-- Main Stylesheet - Overhaul CSS only -->
    <link rel="stylesheet" href="{{ '/assets/css/overhaul.css' | relative_url }}">

    <!-- Mobile Optimizations -->
    <link rel="stylesheet" href="{{ '/assets/css/mobile-optimizations.css' | relative_url }}">
    <link rel="stylesheet" href="{{ '/assets/css/components/oss-summary.css' | relative_url }}">

    <script>
      (function() {
        var resolvedTheme = 'dark';
        var supportsMatchMedia = typeof window.matchMedia === 'function';
        var systemPrefersDark = supportsMatchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;

        try {
          var storedTheme = localStorage.getItem('theme');
          if (storedTheme === 'dark' || storedTheme === 'light') {
            resolvedTheme = storedTheme;
          } else {
            resolvedTheme = systemPrefersDark ? 'dark' : 'light';
          }
        } catch (e) {
          resolvedTheme = systemPrefersDark ? 'dark' : 'light';
        }

        document.documentElement.setAttribute('data-theme', resolvedTheme);
      })();
    </script>

    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-P0TDZ6WNVT"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-P0TDZ6WNVT');
    </script>
</head>

<body>
    <!-- Skip Links for Accessibility -->
    <a href="#main-content" class="skip-link">Skip to main content</a>
    <a href="#site-navigation" class="skip-link">Skip to navigation</a>

    {% include navbar.html %}

    <div class="container" style="padding-top: 2rem; padding-bottom: 4rem;">
        <main id="main-content" role="main">
            {{ content }}
        </main>
    </div>

    {% include footer.html %}

    <!-- Theme Toggle Button -->
    <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
        <i class="fas fa-moon" id="themeIcon"></i>
    </button>

    <script src="{{ '/assets/js/site-shell.js' | relative_url }}" defer></script>
    <script src="{{ '/assets/js/oss-summary.js' | relative_url }}" defer></script>
</body>
</html>
