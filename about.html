title: About
navbar_title: About

<!-- Page Header -->
<div class="about-header">
  <div class="about-header-content">
    <h1 class="about-title">About Me</h1>
    <p class="about-subtitle">My journey, passions, and what drives me</p>
  </div>
</div>

<!-- About Content -->
<div class="about-content">
  <div class="about-bio">
    {{ site.data.profile.short_bio }}
  </div>

  <div class="about-travel" aria-label="Countries visited">
    <p class="about-travel-label">Travel</p>
    <p class="about-travel-list">🇧🇩 Bangladesh, 🇮🇳 India, 🇸🇦 Saudi Arabia, 🇦🇪 UAE, 🇱🇰 Sri Lanka, 🇲🇻 Maldives</p>
  </div>

  <!-- Back to Home -->
  <div class="about-footer">
    <a href="{{ '/' | relative_url }}" class="about-back-link">
      <i class="fas fa-arrow-left"></i>
      <span>Back to Home</span>
    </a>
  </div>
</div>

<style>

  border-bottom: 1px solid var(--color-border);
}

  font-weight: 700;
  margin: 0 0 var(--space-3) 0;
  letter-spacing: -0.02em;
  background: linear-gradient(135deg, var(--color-accent), var(--color-publication));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  color: transparent;
}

[data-theme="light"] .about-title {
  background: linear-gradient(135deg, var(--color-accent), var(--color-publication));
}

[data-theme="dark"] .about-title {
  background: linear-gradient(135deg, var(--color-accent), var(--color-research));
}

.about-subtitle {
  font-size: var(--text-xl);
  color: var(--color-text-muted);
  margin: 0;
  font-weight: 400;
}

  margin: 0 auto;
  animation: fadeInUp 0.5s ease-out;
}

    transform: translateY(20px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}
