<footer class="footer">
    <div class="{% if page.container_class %}{{ page.container_class }}{% else %}container-lg{% endif %}">
        <div class="row my-3">
            <div class="col-6">
                <div class="text-muted">
                    <i>Last updated: {{ "now" | date: "%b %Y" }}</i>
                </div>
            </div>
            <div class="col-6">
                <div class="text-right text-muted">
                    {{ site.data.display.footer_text }}
                </div>
            </div>
        </div>
    </div>
</footer>

<!-- Add a script to fix the appointment button in mobile view -->
<script>
  // Wait for DOM to be fully loaded
  document.addEventListener('DOMContentLoaded', function() {
    // Initial check
    fixAppointmentButton();
    
    // Wait a bit longer for any async components
    setTimeout(fixAppointmentButton, 1000);
    setTimeout(fixAppointmentButton, 2000);
    // Additional check in case the button is loaded after a delay
    setTimeout(fixAppointmentButton, 3500);
  });

  function fixAppointmentButton() {
    // Find any calendar button elements
    var buttons = document.querySelectorAll('[data-calendar-scheduling-button]');
    if (buttons.length > 0) {
      buttons.forEach(function(button) {
        // Apply our custom class
        button.classList.add('appointment-button');
        
        // Fix styling issues regardless of screen size
        button.style.display = 'inline-flex';
        button.style.alignItems = 'center';
        button.style.justifyContent = 'center';
        button.style.writingMode = 'horizontal-tb';
        button.style.textOrientation = 'mixed';
        button.style.letterSpacing = '0.3px';
        
        // Add calendar icon if not already present
        if (!button.getAttribute('data-icon-added')) {
          var buttonText = button.textContent || button.innerText;
          // Remove any existing text
          while (button.firstChild) {
            button.removeChild(button.firstChild);
          }
          
          // Create icon element
          var icon = document.createElement('i');
          icon.className = 'fas fa-calendar-alt mr-2';
          button.appendChild(icon);
          
          // Add text back
          var textNode = document.createTextNode(buttonText);
          button.appendChild(textNode);
          
          // Mark as processed
          button.setAttribute('data-icon-added', 'true');
        }
      });
    }
  }
</script>
