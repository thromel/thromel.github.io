<header class="site-header">
  <div class="site-frame site-header__frame">
    <a class="site-brand" href="{{ '/' | relative_url }}" aria-label="{{ site.data.profile.primary_name }} homepage">
      <span class="site-brand__initials" aria-hidden="true">TR</span>
      <span>{{ site.data.profile.primary_name }}</span>
    </a>

    <div class="site-header__controls">
      <button id="site-menu-toggle" class="site-menu-toggle" type="button" aria-controls="site-navigation" aria-expanded="false" aria-label="Open navigation menu">Menu</button>
      <button id="theme-toggle" class="theme-toggle" type="button" aria-pressed="false" aria-label="Switch to dark mode">Theme</button>
    </div>

    <nav id="site-navigation" class="site-navigation" aria-label="Primary navigation" data-menu-open="false">
      {% for item in site.data.navigation.primary_pages %}
        <a href="{{ item.url | relative_url }}"{% if item.name == page.navbar_title %} aria-current="page"{% endif %}>{{ item.name }}</a>
      {% endfor %}
      <details class="site-more-navigation" data-more-navigation>
        <summary>More</summary>
        <div class="site-more-navigation__menu">
          {% for item in site.data.navigation.secondary_pages %}
          <a href="{{ item.url | relative_url }}"{% if item.name == page.navbar_title %} aria-current="page"{% endif %}>{{ item.name }}</a>
          {% endfor %}
        </div>
      </details>
    </nav>
  </div>
</header>
