<!DOCTYPE html>
<html>
<head>
    <style>
        .placeholder {
            width: 400px;
            height: 300px;
            margin: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
            padding: 20px;
        }

        #profile {
            width: 400px;
            height: 400px;
            background: #2c3e50;
            border-radius: 50%;
        }

        #url-shortener {
            background: #3498db;
        }

        #eventfly {
            background: #e74c3c;
        }

        #image-caption {
            background: #9b59b6;
        }

        #blockchain-health {
            background: #27ae60;
        }

        .icon {
            font-size: 48px;
            margin-bottom: 20px;
        }

        .title {
            font-size: 24px;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 16px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div id="profile" class="placeholder">
        <div class="icon">👤</div>
        <div class="title">Profile Photo</div>
    </div>

    <div id="url-shortener" class="placeholder">
        <div class="icon">🔗</div>
        <div class="title">URL Shortener</div>
        <div class="subtitle">Modern Cloud-Native System</div>
    </div>

    <div id="eventfly" class="placeholder">
        <div class="icon">📅</div>
        <div class="title">Eventfly</div>
        <div class="subtitle">Event Management System</div>
    </div>

    <div id="image-caption" class="placeholder">
        <div class="icon">🖼️</div>
        <div class="title">Image Caption</div>
        <div class="subtitle">AI-Powered Description</div>
    </div>

    <div id="blockchain-health" class="placeholder">
        <div class="icon">🏥</div>
        <div class="title">Healthcare Blockchain</div>
        <div class="subtitle">Secure Patient Data</div>
    </div>
</body>
</html>
