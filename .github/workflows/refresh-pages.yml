name: Refresh GitHub Pages data

on:
  schedule:
    - cron: '17 4 * * *'
  workflow_dispatch:

permissions:
  contents: read
  pages: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger the legacy Pages build from the default branch
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api --method POST "repos/${{ github.repository }}/pages/builds"
