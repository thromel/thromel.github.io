research:
- title: StegFormer-MC&#58; Multi-Cover Image Steganography with Distributed Secret Embedding
  date: March 2025 - Present
  description: >-
    Extended the StegFormer architecture to hide secret images across multiple cover images, 
    with innovative channel- and spatial-splitting strategies, parallel processing branches, 
    and a composite loss function for robust training.

- title: Extending LLM API Contract Analysis&#58; A Refined Taxonomy and Empirical Study
  date: Nov 2024 - Present
  description: >-
    Developed an extended taxonomy for API contracts in LLM libraries, conducted empirical studies on 
    real-world issues, and proposed recommendations for LLM library developers and LLMOps tool builders.

- title: Blockchain in Healthcare 2.0
  date: June 2022 - May 2023
  description: >-
    Engineered an advanced blockchain framework with sharding, Layer-2 solutions, and a DAG ledger, 
    implementing patient-centric consent management, HL7 FHIR standards, and privacy-preserving computation.

