short_bio: >-
  Hi I'm Tanzim. I'm a software engineer and aspiring researcher working on <b>AI/ML security, LLM systems, software engineering, and backend systems</b>. Most of my work sits between research and building: coding-agent tools, research software, microservices, and systems projects in <b>Rust, Python, C#/.NET, TypeScript, and C++</b>. I care about coding agents, trustworthy AI systems, software architecture, and empirical software engineering.
  <br/><br/>
  I keep a daily learning routine, maintain learning logs, and try to turn reading into small builds. That habit helps me balance research collaborations with my full-time engineering role.
  <br/><br/>
  I completed my B.Sc in Computer Science and Engineering from <b>Bangladesh University of Engineering and Technology</b> with a <b>CGPA of 3.53/4.0</b>. I earned a <span class="highlight-sessional"><b>3.86/4.0 GPA in Sessional Courses</b></span>, the lab and project-based core of BUET's curriculum. I received the <b>Dean's List Award</b> and placed <a href="https://tanzimhromel.com/projects/bangla_digit_recognition/" target="_blank">2nd in the Bangla Handwritten Digits Recognition contest</a>.
  <br/><br/>
  During undergrad, our project "<a href="/projects/blockchain-ticketing" target="_blank">Blockchain Based Ticketing Platform</a>" was a finalist in the <b><a href="https://bcolbd.org/2021/teams" target="_blank">Blockchain Olympiad Bangladesh 2021 (BCOLBD 2021)</a></b>. I worked with <a href="https://fazledyn.github.io" target="_blank">Ataf Fazledin Ahamed</a> and <a href="https://www.linkedin.com/in/md-tanzim-azad-a879a51b7/" target="_blank">Md. Tanzim Azad Nishan</a> to build a decentralized solution that addressed ticket fraud and scalping through smart contracts.
  <br/><br/>
  I work as a Software Development Engineer at <a href="https://www.iqvia.com/">IQVIA</a> (NYSE: IQV), a Fortune 500 company and healthcare data analytics provider that serves 90% of the top pharmaceutical companies worldwide. At IQVIA, I work on healthcare analytics microservices for patient-level data workflows, add observability for critical data pipelines, design cloud-native services on AWS, and help integrate LLM/RAG capabilities into dashboard setup, analysis, and export workflows.
  <br/><br/>
  In May 2025, I received the <a href='https://drive.google.com/file/d/1Vc4E2RoQEPmbfS56oLdUih-oJDBok9sP/view?usp=share_link' target='_blank'><b>IQVIA Impact Program - Silver</b></a> award for performance, critical issue resolution, and feature delivery.
  <br/><br/>
  My current research is about agentic software systems under real engineering constraints. I am working on <a href="https://www.sregym.com/" target="_blank" rel="noopener noreferrer">SREGym</a> and AI for SRE with Professor <a href="https://tianyin.github.io/" target="_blank">Tianyin Xu's group</a> at UIUC, submitted SHIFT to TACL 2026 on aligned backdoor attacks in LLM agents with <a href="https://cse.buet.ac.bd/faculty/faculty_detail/rakinhaider" target="_blank" rel="noopener noreferrer">Chowdhury Rakin Haider</a>, and building coding-agent systems around <a href="/showcase/projects/contextledger/">ContextLedger</a>, <a href="https://github.com/thromel/ctxhelm" target="_blank" rel="noopener noreferrer">ctxhelm</a>, and <a href="/showcase/projects/patchsmith/">PatchSmith</a>.
  <br/><br/>
  I also work on history-aware vibe coding with <a href="https://homepage.zhouyang.me/" target="_blank" rel="noopener noreferrer">Dr. Zhou Yang</a>, VeriSchema for multi-agent database schema generation, and <a href="https://github.com/tsantalis/RefactoringMiner" target="_blank" rel="noopener noreferrer">RefactoringMiner</a>, where I collaborate with Professor <a href="https://users.encs.concordia.ca/~nikolaos/" target="_blank" rel="noopener noreferrer">Nikolaos Tsantalis</a>, helped build the MCP server that connects refactoring analysis with coding agents, and contribute to the <a href="https://www.jetbrains.com/" target="_blank" rel="noopener noreferrer">JetBrains</a> collaboration. Earlier collaborations include <a href="https://akondrahman.github.io" target="_blank">Dr. Akond Rahman</a> (Auburn University, <a href="https://paser-group.github.io/" target="_blank">PASER group</a>) on LLM API contracts and <a href="https://cse.buet.ac.bd/faculty/faculty_detail/asmlatifulhoque" target="_blank">Professor ASM Latiful Hoque</a> (BUET), who supervised my undergraduate thesis, on blockchain technology.
  <br/><br/>
  I worked with the <a href="https://ureporter.cse.buet.ac.bd/about_us" target="_blank">uReporter team</a> on Bangladesh's first anonymous online reporting system for citizens to report social issues. The project received coverage from BBC Bengali, Saudi Gazette, and Global Voices. Our research on this work is under review at the ACM CSCW conference.
  <br/><br/>
  I tend to learn by chasing first principles. I draw inspiration from Claude Shannon and Richard Feynman, and from the distributed systems work of <a href="https://en.wikipedia.org/wiki/Leslie_Lamport" target="_blank">Leslie Lamport</a>. I'm also influenced by early attention-mechanism research that reshaped modern AI.
  <br/><br/>
  I'm currently reading <b>"Designing Data-Intensive Applications"</b> and <b>"Hands-On Large Language Models"</b> by Jay Alammar. I'm also preparing for the <b>Certified Kubernetes Application Developer (CKAD)</b> and <b>AWS Solution Architect Associate</b> certifications. You can check out my <a href="/learning">learning resource recommendations here</a>.
  <br/><br/>
  I grew up in <b>Rajshahi</b> and now live in <b>Uttara, Dhaka</b>.
  <br/><br/>
  I am a <b>researcher</b>, and I'm excited to continue my academic journey in computer science while staying hands-on in software engineering and research.
  <br/><br/>
  
  

