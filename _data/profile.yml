about_snippet: >-
  Hi, I'm Tanzim. I'm a software engineer and researcher working on software engineering, LLM systems, and AI/ML security.
  I build developer tools for coding agents, research pipelines, and backend systems. At
  <a href="https://www.iqvia.com" target="_blank">IQVIA</a>, I work on healthcare analytics microservices for patient-level data workflows
  and help integrate LLM/RAG features into dashboard tooling. I also work with researchers at
  <a href="https://eng.auburn.edu" target="_blank">Auburn University</a> and
  <a href="https://cse.buet.ac.bd" target="_blank">BUET</a> on ML security and blockchain systems.

