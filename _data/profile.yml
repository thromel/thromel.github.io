  - Pytest
  - Observability
  - Release Engineering
- title: "ctxhelm: agent-native context compiler"
  link: https://github.com/thromel/ctxhelm
  date: May 2026 - Present
  description: >-
    Rust project for helping coding agents inspect the right files before they edit. ctxhelm ships as v2.4.0 through GitHub release archives and
    Homebrew, with checksum, archive, doctor, MCP, release-gate, and source-free proof checks. It combines lexical, symbol, graph, related-test,
    git-history, semantic-metadata, memory, and feedback signals, then exposes task plans and packs through CLI and MCP. I am also building HelmBench,
    a source-free benchmark for separating context-selection quality from downstream patch quality. The current Codex RefactoringMiner matrix keeps
    task success and validation flat while improving recommendation recall, follow-through, context precision, edited-file recall, and irrelevant-read rate.
  technologies:
  - Rust
  - MCP
  - Coding Agents
  - Context Engineering
  - Symbol Indexing
  - Graph Retrieval
  - Evaluation
  - HelmBench
  - Release Engineering
