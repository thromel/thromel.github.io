    with Professor <a href="https://tianyin.github.io/" target="_blank" rel="noopener noreferrer">Tianyin Xu's group</a>, I am working on
    <a href="https://www.sregym.com/" target="_blank" rel="noopener noreferrer">SREGym</a>, an AI-native benchmark platform for evaluating SRE agents in
    live software and systems reliability incidents. My current focus is failure scenarios with realistic mitigation paths, business-level oracles,
    and evidence that rejects shallow fixes. The public code is on <a href="https://github.com/SREGym/SREGym" target="_blank" rel="noopener noreferrer">GitHub</a>.
