projects:
- title: "ContextLedger: context accounting for coding agents"
  link: /showcase/projects/contextledger/
  date: Jun 2026 - Present
  description: >-
    Research prototype inside an OpenCode fork for making coding-agent context management measurable. It converts long-session history into
    typed events with provenance, token cost, recoverability, file hints, spans, and dependencies, then tests compaction policies such as
    <code>precision-frontier</code>. The first bounded openai/gpt-5.5 noisy-compaction smoke kept full recall while cutting compaction input
    to 852 tokens on that fixture. I am keeping the claim narrow: this is compaction evidence, not solve-rate proof yet.
  technologies:
  - TypeScript
  - OpenCode
  - GPT-5.5
  - Context Management
  - Coding Agents
  - Compaction
  - Benchmarking
- title: "PatchSmith: repair agents that leave receipts"
