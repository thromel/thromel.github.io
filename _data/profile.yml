  - Contributed to an internal <b>LangGraph</b>/<b>LangChain</b> prototype that converted analyst requests into typed dashboard operations, retrieved KPI definitions through <b>RAG</b>, invoked restricted tools through <b>MCP</b>, and validated action payloads; in a 30-prompt retrospective evaluation, 25 of 30 (83.3%) produced structurally valid plans and 45 of 50 (90%) tool calls completed successfully
