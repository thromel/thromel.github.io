- title: "An Empirical Study on Remote Code Execution in Machine Learning Model Hosting Ecosystems"
  date: June 2025 - Oct 2025
  link: https://arxiv.org/pdf/2601.14163
  thumbnail: /assets/images/ml-rce.webp
  status: "Under review at ICSE 2027"
  short_description: First large-scale cross-platform study analyzing ~45,000 repositories across 5 major ML platforms for security vulnerabilities.
  description: >-
    Cross-platform study of ~45,000 repositories across five ML platforms (Hugging Face, ModelScope, OpenCSG, OpenMMLab, PyTorch Hub)
    with co-authors Mohammed Latif Siddiq, Natalie Sekerak, Beatrice Casey, and Joanna C. S. Santos. Detected security issues using static analyzers (Bandit, CodeQL, Semgrep)
    and YARA malware signatures: found CWE-502 (unsafe deserialization) in 74.54% and CWE-95 (eval injection) in 15.02% of affected
    repositories; 10.41% of Hugging Face repos contain security smells. Analyzed 600+ developer discussions to build a taxonomy of
    security misconceptions; found 6.6% SafeTensors adoption and heavy trust_remote_code usage. <b>Under review at ICSE 2027.</b>
  technologies:
  - Python
  - Bandit
  - CodeQL
  - Semgrep
  - YARA
  - CWE Analysis

- title: "The Choice Can Be the Attack: Auditing Aligned Backdoors in LLM Agents"
  date: August 2025 - Present
  link: /research/reagent-plus-plus/
  status: "Submitted to TACL 2026"
  short_description: SHIFT audit for aligned backdoor attacks where a trigger changes which valid option an LLM agent chooses.
  description: >-
    Submitted to TACL 2026 with <a href="https://cse.buet.ac.bd/faculty/faculty_detail/rakinhaider" target="_blank" rel="noopener noreferrer">Chowdhury Rakin Haider</a>.
    The paper studies aligned backdoor attacks in LLM agents: a trigger can leave the final task
    answer looking valid while quietly changing which acceptable option the agent chooses. SHIFT, the Structured Hidden Influence Test,
    reruns matched tasks with and without a known trigger, then checks whether the changed choice favors the attacker's target after accounting
    for ordinary option quality such as price or rating.
  collaborator: >-
    Collaboration with <a href="https://cse.buet.ac.bd/faculty/faculty_detail/rakinhaider" target="_blank" rel="noopener noreferrer">Chowdhury Rakin Haider</a>, Assistant Professor at BUET.
  technologies:
  - SHIFT
  - Structured Hidden Influence Test
  - WebShop
  - Aligned Backdoors
  - LLM Agents
  - Choice Auditing

- title: "History-Aware Vibe Coding"
  date: June 2026 - Present
  status: "Emerging research direction"
  short_description: Studying how natural-language coding loops should use edit history, repository memory, and design intent.
  description: >-
    I am studying how coding agents should use commit history, prior edits, repository memory, and design intent when developers work through
    natural-language programming loops. The aim is simple: preserve the speed of vibe coding while keeping enough architectural memory to avoid
    repeating old mistakes. This direction connects to my work with <a href="https://homepage.zhouyang.me/" target="_blank" rel="noopener noreferrer">Dr. Zhou Yang</a>
    at the University of Alberta.
  collaborator: >-
