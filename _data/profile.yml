  description: >-
    Backend engineer on IQVIA's KPI Library platform, working across configuration, dashboard, and export workflows for healthcare analytics. Built and maintained C#/.NET services, data-access components, automated test infrastructure, and an internal AI-assisted workflow prototype using EF Core, SQL Server, MongoDB, and AWS S3.
  responsibilities:
  - Built and maintained <b>C#/.NET</b> services and shared components across four KPI Library workflow areas—configuration, dashboard, export, and gateway; used <b>EF Core</b> with <b>SQL Server</b> for configuration data, <b>MongoDB</b> for dashboard caching, and <b>AWS S3</b> in export workflows
