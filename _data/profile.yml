short_bio: >-
  &#x1F44B Hi I'm Tanzim. I'm a software engineer and aspiring researcher. My interest lies in the fields of <b>Blockchain Technology, LLM Systems, and Image Steganography</b>. My current career goal is to pursue excellence in software engineering while contributing to cutting-edge research.
  <br/><br/>
  💼 I am currently a Software Development Engineer at <a href="https://www.iqvia.com/">IQVIA</a> (NYSE: IQV), a Fortune 500 company and global leader in healthcare data analytics, serving 90% of top pharmaceutical companies worldwide. At IQVIA, I develop microservices-based applications handling millions of patient records, implement observability solutions for critical healthcare data pipelines, architect cloud-native solutions on AWS, and integrate LLM capabilities into clinical data analytics dashboards for natural language querying and automated report generation.
  <br/><br/>
  &#x1F4DC I've conducted research on Blockchain in Healthcare, developing an advanced framework with sharding, Layer-2 solutions, and DAG ledger. I'm also working on projects related to LLM API Contract Analysis and Multi-Cover Image Steganography.
  <br/><br/>
  &#x1F3C6 During my time at BUET, I received recognition for my academic achievements, including the <b>Dean's List Award</b> and placing 2nd in the Bangla Handwritten Digits Recognition contest.
  <br/><br/>
  🏫 I completed my B.Sc in Computer Science and Engineering from <b>Bangladesh University of Engineering and Technology</b> with a GPA of 3.53/4.0.
  <br/><br/>
  🏙️ I grew up in <b>Rajshahi</b>, a serene city in northwestern Bangladesh known as the "City of Education" and famous for its silk production, clean streets, mangoes, and the beautiful Padma River. Currently, I live in <b>Uttara, Dhaka</b>—Bangladesh's vibrant capital and one of South Asia's fastest-growing megacities, which offers a dynamic environment with opportunities to collaborate with leading tech companies and research institutions.
  <br/><br/>
  📚 I'm currently reading <b>"Designing Data-Intensive Applications"</b> and <b>"Hands-On Large Language Models"</b> by Jay Alammar to deepen my understanding of data systems and LLMs.
  <br/><br/>
  🔄 I'm actively preparing for the <b>Certified Kubernetes Application Developer (CKAD)</b> and <b>AWS Solution Architect Associate</b> certifications to advance my knowledge in cloud infrastructure.
  <br/><br/>
  🔍 As a <b>motivated researcher</b>, I am actively seeking <b>PhD/MSc positions for Spring/Fall 2026</b> to further my academic journey in computer science, focusing on distributed systems, AI, and blockchain technology.
  <br/><br/>
  📄 Check out my <a href="https://drive.google.com/file/d/166EX2yVOQNaTkI9mPqoDmB3TzVyjCLYi/view?usp=sharing" target="_blank">CV</a> for more details about my experience and qualifications.

