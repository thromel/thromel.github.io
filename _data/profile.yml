current_focus:
  primary: >-
    Right now I am working on <a href="https://www.sregym.com/" target="_blank" rel="noopener noreferrer">SREGym</a>, an AI-native benchmark for
    Site Reliability Engineering agents, through <a href="https://uiuc-srse.github.io/" target="_blank" rel="noopener noreferrer">UIUC++ SRSE 2026</a>
    with Professor <a href="https://tianyin.github.io/" target="_blank" rel="noopener noreferrer">Tianyin Xu's group</a>. I also submitted the
    <span class="academic-highlight">SHIFT</span> manuscript to TACL 2026 with <a href="https://cse.buet.ac.bd/faculty/faculty_detail/rakinhaider" target="_blank" rel="noopener noreferrer">Chowdhury Rakin Haider</a>,
    building coding-agent systems around context, retrieval, and repair, and continuing work on VeriSchema and RefactoringMiner.
  open_source: >-
    Open-source work is part of that research loop: I actively develop <a href="https://github.com/tsantalis/RefactoringMiner" target="_blank" rel="noopener noreferrer">RefactoringMiner</a>
    with Professor <a href="https://users.encs.concordia.ca/~nikolaos/" target="_blank" rel="noopener noreferrer">Nikolaos Tsantalis</a>, helped build its MCP server for coding-agent integration,
    and am involved in the <a href="https://www.jetbrains.com/" target="_blank" rel="noopener noreferrer">JetBrains</a> collaboration around developer-tool integration. I also continue contributing to EF Core, GenHTTP,
    deepagents, and TypeScript when the work lines up with my tooling interests.

research_statement:
  summary: >-
    I study how AI agents behave when they operate on real software systems: what context they read, which actions they choose, how they recover
    from failures, and what evidence they leave behind. The goal is not to make agents look impressive in a demo. I want agentic systems that
    can be inspected, evaluated, and trusted under messy engineering conditions.
  lanes:
  - title: "AI for SRE"
    status: "SREGym / UIUC++ SRSE 2026"
    link: https://www.sregym.com/
    summary: >-
      With Professor <a href="https://tianyin.github.io/" target="_blank" rel="noopener noreferrer">Tianyin Xu's group</a> at UIUC, I am working on
      <a href="https://www.sregym.com/" target="_blank" rel="noopener noreferrer">SREGym</a>, an AI-native benchmark that puts agents inside live
      cloud-native failure scenarios. My focus is diagnosis, safe mitigation, and business-level checks, not just making the cluster look healthy.
    tags:
    - SREGym
    - AI for SRE
    - Kubernetes
    - Incident response
  - title: "Agent security"
    status: "Submitted to TACL 2026"
    link: /research/reagent-plus-plus/
    summary: >-
      Submitted SHIFT, the Structured Hidden Influence Test for aligned backdoor attacks in LLM agents, to TACL 2026. SHIFT checks
      whether a trigger changes which valid option an agent chooses, then asks whether the movement favors the attacker's target rather than
      ordinary option quality. This work is in collaboration with <a href="https://cse.buet.ac.bd/faculty/faculty_detail/rakinhaider" target="_blank" rel="noopener noreferrer">Chowdhury Rakin Haider</a>.
    tags:
    - SHIFT
    - Aligned backdoors
    - LLM agents
    - Choice auditing
  - title: "Coding-agent systems"
    status: "ContextLedger / ctxhelm / PatchSmith"
    link: /projects#featured-projects-title
    summary: >-
      I work on coding agents from three angles: preserving exact session facts, retrieving the right files before editing, and developing
      DeepAgents-based repair systems that leave testable evidence.
    points:
    - label: "Context management"
      text: "<a href=\"/showcase/projects/contextledger/\">ContextLedger</a> turns long sessions into typed, provenance-carrying events for measurable compaction."
    - label: "Retrieval efficiency"
      text: "<a href=\"https://github.com/thromel/ctxhelm\" target=\"_blank\" rel=\"noopener noreferrer\">ctxhelm</a> and HelmBench test whether agents inspect the right files with less irrelevant reading."
    - label: "Repair agents"
      text: "<a href=\"/showcase/projects/patchsmith/\">PatchSmith</a> explores bounded DeepAgents repair runs with traces, sandbox validation, and readiness reports."
    tags:
    - ContextLedger
    - ctxhelm
    - PatchSmith
    - DeepAgents
  - title: "History-aware vibe coding"
    status: "Emerging research direction"
    summary: >-
      I am exploring how coding agents should use edit history, repository memory, and design intent when developers work through natural-language
      programming loops. This direction connects to my work with <a href="https://homepage.zhouyang.me/" target="_blank" rel="noopener noreferrer">Dr. Zhou Yang</a>
      at the University of Alberta: keep the speed of vibe coding without losing architectural memory.
    tags:
    - Vibe coding
    - Edit history
    - Agent memory
    - Developer tools
  - title: "Verified schema generation"
    status: "VeriSchema"
    link: /research/multi-agent-db-schema/
    summary: >-
      VeriSchema studies multi-agent database-schema generation from natural-language requirements, with specialized agents, auto-repair, and
      formal checks for relational consistency.
    tags:
    - VeriSchema
    - Multi-agent systems
    - Schema generation
    - Z3
  - title: "Software evolution tooling"
    status: "RefactoringMiner / MCP / JetBrains collaboration"
    link: https://github.com/tsantalis/RefactoringMiner
    summary: >-
      I actively develop <a href="https://github.com/tsantalis/RefactoringMiner" target="_blank" rel="noopener noreferrer">RefactoringMiner</a> with
      Professor <a href="https://users.encs.concordia.ca/~nikolaos/" target="_blank" rel="noopener noreferrer">Nikolaos Tsantalis</a>. I helped build its MCP server
      and am involved in the <a href="https://www.jetbrains.com/" target="_blank" rel="noopener noreferrer">JetBrains</a> collaboration so coding agents can reason
      about real refactorings through program-analysis tooling, not only raw diffs.
    tags:
    - RefactoringMiner
    - MCP
    - Program analysis
    - Refactoring

