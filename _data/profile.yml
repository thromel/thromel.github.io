research:
- title: "An Empirical Study on Remote Code Execution in ML Model Hosting Ecosystems"
  date: June 2025 - Oct 2025
  link: https://arxiv.org/pdf/2601.14163
  thumbnail: /assets/images/ml-rce.png
  status: "Submitted to TOSEM 2026"
  short_description: First large-scale cross-platform study analyzing ~45,000 repositories across 5 major ML platforms for security vulnerabilities.
  description: >-
    Cross-platform study of ~45,000 repositories across five ML platforms (Hugging Face, ModelScope, OpenCSG, OpenMMLab, PyTorch Hub)
    with co-authors Mohammad Latif Siddiq and Joanna C. Santos. Detected security issues using static analyzers (Bandit, CodeQL, Semgrep)
    and YARA malware signatures: found CWE-502 (unsafe deserialization) in 74.54% and CWE-95 (eval injection) in 15.02% of affected
    repositories; 10.41% of Hugging Face repos contain security smells. Analyzed 600+ developer discussions to build a taxonomy of
    security misconceptions; found 6.6% SafeTensors adoption and heavy trust_remote_code usage. <b>Submitted to TOSEM 2026.</b>
  technologies:
  - Python
  - Bandit
  - CodeQL
  - Semgrep
  - YARA
  - CWE Analysis

- title: "ReAgent++: Detecting Aligned Backdoors in LLM Agents"
  date: August 2025 - Present
  link: /assets/pdf/reagent-plus-plus.pdf
  status: "In Progress"
  short_description: Extending ReAgent to detect aligned backdoors that maintain semantic consistency while subverting user intent through preference manipulation.
  description: >-
    Extending ReAgent to detect aligned backdoors that keep semantic consistency while subverting user intent through preference
    manipulation; collaboration with Dr. Chowdhury Md. Rakin Haider (BUET). Implementing Text/Env-STRIP for perturbation-based runtime
    detection with FAR ≤ 5% at FRR = 1-2%, and K-Arm trigger inversion for forensic analysis with multi-armed bandit optimization.
    Evaluating on three benchmarks (WebShop-1.18M products, OSWorld-369 tasks, AgentBench) against an attack suite including
    Sleeper-style, instruction backdoors, and multi-turn hidden triggers.
  technologies:
  - Python
  - STRIP
  - K-Arm
  - UCB Scheduler
  - WebShop
  - OSWorld
  - AgentBench

