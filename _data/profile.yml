short_bio: >-
  &#x1F44B Hi I'm Tanzim. I'm a software engineer and aspiring researcher passionate about creating solutions that make lives better for people. My interest lies in the fields of <b>Software Engineering, Blockchain, and Image Steganography</b>, with a strong focus on <b>DevOps, Backend Engineering & AI Engineering</b>. I'm particularly interested in <b>Domain Driven Design, System Architecture, and Software Architecture</b>. Being both research and development oriented, I believe I can tackle challenges that require both kinds of efforts.
  <br/><br/>
  🏫 I completed my B.Sc in Computer Science and Engineering from <b>Bangladesh University of Engineering and Technology</b> with a GPA of 3.53/4.0. During my time at BUET, I received recognition for my academic achievements, including the <b>Dean's List Award</b> and placing <a href="https://tanzimhromel.com/showcase/projects/bangla_digit_recognition/" target="_blank">2nd in the Bangla Handwritten Digits Recognition contest</a>.
  <br/><br/>
  🏅 During my undergraduate studies, I was selected as a <b>finalist in the <a href="https://bcolbd.org/2021/teams" target="_blank">Blockchain Olympiad Bangladesh 2021 (BCOLBD 2021)</a></b> with our project "<a href="/experience#projects">Blockchain Based Ticketing Platform</a>." I worked as part of the "Recursively Enumerable" team alongside <a href="https://fazledyn.github.io" target="_blank">Ataf Fazledin Ahamed</a> and <a href="https://www.linkedin.com/in/md-tanzim-azad-a879a51b7/" target="_blank">Md. Tanzim Azad Nishan</a>, developing a decentralized solution to address ticketing fraud and scalping issues through smart contracts and blockchain technology.
  <br/><br/>
  💼 I am currently a Software Development Engineer at <a href="https://www.iqvia.com/">IQVIA</a> (NYSE: IQV), a Fortune 500 company and global leader in healthcare data analytics, serving 90% of top pharmaceutical companies worldwide. At IQVIA, I develop microservices-based applications handling millions of patient records, implement observability solutions for critical healthcare data pipelines, architect cloud-native solutions on AWS, and integrate LLM capabilities into clinical data analytics dashboards for natural language querying and automated report generation.
  <br/><br/>
  🏆 In May 2025, I received the <a href='https://drive.google.com/file/d/1Vc4E2RoQEPmbfS56oLdUih-oJDBok9sP/view?usp=share_link' target='_blank'><b>IQVIA Impact Program – Silver</b></a> award for outstanding performance, critical issue resolution, and impactful feature development.
  <br/><br/>
  &#x1F4DC I'm currently working on research projects related to <a href="/research#research-projects">Blockchain in Healthcare</a> (developing an advanced framework with sharding, Layer-2 solutions, and DAG ledger), <a href="/research#research-projects">LLM API Contract Analysis</a>, and <a href="/research#research-projects">Multi-Cover Image Steganography</a>.
  <br/><br/>
  🤝 I'm fortunate to collaborate with esteemed researchers: <a href="https://sites.google.com/site/abmalimalislam/home" target="_blank">Professor A. B. M. Alim Al Islam</a> (BUET) on image steganography, <a href="https://akondrahman.github.io" target="_blank">Dr. Akond Rahman</a> (Auburn University) on LLM API contracts, and <a href="https://cse.buet.ac.bd/faculty/faculty_detail/asmlatifulhoque" target="_blank">Professor ASM Latiful Hoque</a> (BUET) on blockchain technology who was also my undergraduate thesis supervisor.
  <br/><br/>
  🌐 I'm proud to have worked with the <a href="https://ureporter.cse.buet.ac.bd/about_us" target="_blank">uReporter team</a>, contributing to Bangladesh's first anonymous online reporting system designed to empower citizens to safely and effectively report social issues. This project has received coverage from international media including BBC Bengali, Saudi Gazette, and Global Voices. Our research on this work is currently <a href="/research#publications">under review at the ACM CSCW conference</a>.
  <br/><br/>
  📚 I'm currently reading <b>"Designing Data-Intensive Applications"</b> and <b>"Hands-On Large Language Models"</b> by Jay Alammar to deepen my understanding of data systems and LLMs. I'm also actively preparing for the <b>Certified Kubernetes Application Developer (CKAD)</b> and <b>AWS Solution Architect Associate</b> certifications to advance my knowledge in cloud infrastructure. You can check out my <a href="/learning">learning resource recommendations here</a>.
  <br/><br/>
  🏙️ I grew up in <b>Rajshahi</b>, a serene city in northwestern Bangladesh known as the "City of Education" and famous for its silk production, clean streets, mangoes, and the beautiful Padma River. Currently, I live in <b>Uttara, Dhaka</b>—Bangladesh's vibrant capital and one of South Asia's fastest-growing megacities, which offers a dynamic environment with opportunities to collaborate with leading tech companies and research institutions.
  <br/><br/>
  🔍 My current career goal is to pursue excellence in software engineering while contributing to cutting-edge research. As a <b>motivated researcher</b>, I am actively seeking <b>PhD/MSc positions for Spring/Fall 2026</b> to further my academic journey in computer science, focusing on software engineering, distributed systems, AI, and blockchain technology.

