# Learning Resources
resources:
  # Software Engineering
  - title: "Clean Code"
    author: "Robert C. Martin"
    type: "Book"
    category: "SWE"
    link: "https://www.amazon.com/Clean-Code-Handbook-Software-Craftsmanship/dp/0132350882"
    description: "Essential guide to writing readable, maintainable code."

  - title: "The Pragmatic Programmer"
    author: "David Thomas & Andrew Hunt"
    type: "Book"
    category: "SWE"
    link: "https://pragprog.com/titles/tpp20/the-pragmatic-programmer-20th-anniversary-edition/"
    description: "Timeless advice for software developers on craft and career."

  - title: "Refactoring"
    author: "Martin Fowler"
    type: "Book"
    category: "SWE"
    link: "https://martinfowler.com/books/refactoring.html"
    description: "Improving the design of existing code without changing behavior."

