agenda:
  eyebrow: "Research dossier · software systems and AI agents"
  thesis: >-
    I study AI agents where software systems, security boundaries, and operational
    evidence matter. The aim is to make agent behavior inspectable before it is trusted.
  trajectory: >-
    Current work combines reliability-agent evaluation, security audits for agent choices,
    and developer tools that make context and software evolution easier to examine.
  next_step: "M.Sc. in Computing Science at the University of Alberta, beginning September 2026."

identity:
  role_line: "Researcher · software engineer · open-source contributor"
  summary: >-
    I study AI agents in real software systems. I want to know what they read, which
    actions they take, how they recover from failures, and whether their evidence holds up.
  bridge: >-
    My work spans software reliability, agent security, empirical software engineering,
    program analysis, developer tools, and healthcare systems.
  markers:
    - label: "UIUC++ SRSE 2026"
      affiliation: "UIUC"
      logo: "/assets/images/companies/uiuc-block-i.png"
      logo_alt: "UIUC Block I logo"
    - label: "Incoming Alberta M.Sc."
      affiliation: "University of Alberta"
      logo: "/assets/images/education/ualberta-logo.svg"
      logo_alt: "University of Alberta crest"
    - label: "BUET CSE"
      affiliation: "BUET"
      logo: "/assets/images/education/buet-logo.png"
      logo_alt: "BUET logo"
    - label: "Dhaka, Bangladesh"

about:
  - >-
    I grew up in Rajshahi and now live in Dhaka. I like work that starts with a research
    question and ends with something I can run, test, or measure.
  - >-
    That usually means reading papers, tracing failures, building tools, and writing down
    what actually happened.

anchors:
  - id: sregym
    publicity: "public"
    label: "Reliability-agent evaluation"
    title: "SREGym: AI for SRE and reliability-agent evaluation"
    question: "How can we evaluate an SRE agent in a live software environment without mistaking a shallow recovery for a reliable one?"
    description: >-
      Through UIUC++ SRSE 2026, I am working on SREGym, a benchmark for evaluating
      SRE agents in live system environments and real-world reliability problems.
    status: "Active research · UIUC++ SRSE 2026"
    context: "June–August 2026 · Professor Tianyin Xu and the UIUC systems reliability group"
    last_verified: "2026-07-10"
    image: "/assets/images/companies/uiuc-block-i.png"
    image_alt: "University of Illinois Block I mark"
    image_caption: "Research context · UIUC++ SRSE 2026"
    links:
      - label: "SREGym project"
        url: "https://www.sregym.com/"
      - label: "Public repository"
        url: "https://github.com/SREGym/SREGym"

  - id: ml-hosting-rce
    publicity: "public"
    label: "ML ecosystem security"
    title: "Remote Code Execution in ML model hosting ecosystems"
    question: "What risks emerge when model-hosting platforms load community code and artifacts at ecosystem scale?"
    description: >-
      A cross-platform empirical study examines custom model-loading risk across five ML
      hosting ecosystems, using static analysis, malware-signature scanning, and more than
      600 developer discussions.
    status: "Under review at ICSE 2027"
    context: "With Mohammed Latif Siddiq, Natalie Sekerak, Beatrice Casey, and Joanna C. S. Santos"
    last_verified: "2026-07-10"
    image: "/assets/images/ml-rce.webp"
    image_alt: "Methodology overview for the study of remote code execution in machine learning model hosting ecosystems"
    image_caption: "Study methodology · five hosting ecosystems"
    links:
      - label: "arXiv record"
        url: "https://arxiv.org/abs/2601.14163"
      - label: "Research summary"
        url: "/research/ml-remote-code-execution/"

  - id: shift
    publicity: "abstract-only"
    label: "Agent security"
    title: "The Choice Can Be the Attack: auditing aligned backdoors in LLM agents"
    question: "Can a trigger steer an agent toward an attacker’s preferred valid choice while its final answer still appears acceptable?"
    description: >-
      SHIFT compares matched tasks with and without a known trigger, then asks whether a
      changed valid choice favors an attacker’s target after accounting for ordinary option quality.
    status: "Submitted to TACL 2026 · manuscript not public"
    context: "With Chowdhury Rakin Haider · abstract-level summary only"
    last_verified: "2026-07-10"
    image: "/assets/images/agentic_ai_architecture.png"
    image_alt: "Conceptual architecture of an agentic AI system with tools, memory, and orchestration"
    image_caption: "System context · choices inside an agent workflow"
    links:
      - label: "Abstract-level summary"
        url: "/research/reagent-plus-plus/"
      - label: "Collaborator profile"
        url: "https://cse.buet.ac.bd/faculty/faculty_detail/rakinhaider"

  - id: coding-agent-systems
    publicity: "public"
    label: "Coding-agent systems"
    title: "Context, retrieval, and auditable repair"
    question: "How can coding agents preserve exact session facts, inspect the right files, and leave testable repair evidence?"
    description: >-
      ContextLedger measures what survives context compaction, ctxhelm and HelmBench
      evaluate retrieval efficiency, and PatchSmith records bounded repair runs with
      sandbox validation and inspectable artifacts.
    status: "Active systems research"
    context: "ContextLedger · ctxhelm and HelmBench · PatchSmith"
    last_verified: "2026-07-10"
    links:
      - label: "ContextLedger"
        url: "/showcase/projects/contextledger/"
      - label: "ctxhelm"
        url: "https://github.com/thromel/ctxhelm"
      - label: "PatchSmith"
        url: "/showcase/projects/patchsmith/"

  - id: history-aware-vibe-coding
    publicity: "public"
    label: "Agent memory"
    title: "History-aware vibe coding"
    question: "Can coding agents preserve architectural intent while developers work through fast natural-language programming loops?"
    description: >-
      This emerging direction studies how agents should use commit history, prior edits,
      repository memory, and design intent without losing the speed of vibe coding.
    status: "Emerging research direction"
    context: "With Dr. Zhou Yang · University of Alberta and Amii"
    last_verified: "2026-07-10"
    links:
      - label: "Research collaborator"
        url: "https://homepage.zhouyang.me/"

  - id: verified-schema-generation
    publicity: "public"
    label: "Multi-agent verification"
    title: "VeriSchema: verified database-schema generation"
    question: "How can specialized agents generate relational schemas while formal checks and targeted repair keep the result consistent?"
    description: >-
      VeriSchema uses agents for entity extraction, relationship mining, normalization,
      and repair, with Z3 checks and component-level retries for relational consistency.
    status: "Active research · targeting PVLDB"
    context: "With Dr. Sukarna Barua · BUET"
    last_verified: "2026-07-10"
    links:
      - label: "Research summary"
        url: "/research/multi-agent-db-schema/"

